# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# ~/.config/starship.toml
#
# ### Variant 2: two line prompt, no background in top line, separators on left side
# *** Borrowed from a design seen in a zsh (should be from https://github.com/romkatv/powerlevel10k)
#
# - No filling solid line in top row: 
#   Replace '$fill\' with just one character '\' or just completely delete the line that contains '$fill\' further down,
#   within the format-block: format = """ ... """.
#
# - '$line_break': everything from the next line on refers to the second line of the prompt.
#
# - Some modules listed further down will not show up (all the time), as their default value is 'disabled = true' or
#   they are only displayed under certain conditions.
#
# - Symbols:
# Don't be confused if you see this toml file via web browser on Starship website, gist, ... and you don't see any "real" symbols here.
# If Nerd-fonts are already installed on your system, it should work
# Recomended Fonts: Meslo Nerd Font patched for Powerlevel10k
# Link: https://github.com/romkatv/powerlevel10k?tab=readme-ov-file#meslo-nerd-font-patched-for-powerlevel10k
#       --> see "Manual font installation": Links for 4 Font Types


# Customizing the prompt (and placing desired modules at desired position and sequence):
format = """
[έΧφέΧ┤](fg:#505050)\
$os\
$sudo\
$directory\
$git_branch$git_commit$git_state$git_metrics$git_status\
$python\
$rust\
$jobs\
$memory_usage\
[ ](fg:#242424)\
$fill\
$line_break\
[έΧ░έΧ┤](fg:#505050)\
$cmd_duration\
[$status\
$character]($style)
"""

# Inserts a blank line between shell prompts:
add_newline = true

# Customization and activation of some modules:
# Listed in the order of their position in the module row above
[os]
disabled = false
format = "[$symbol ]($style)[| ](fg:white bold)"
style = "fg:#1793d1"

[os.symbols]
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
Arch = "ΎΝΔ"
CentOS = "ΎΝΕ"
Debian = "ΎΝΗ"
DragonFly = "ΏθΡΚ" # "ΌηΗ"
Emscripten = "ΏθΦΩ"
EndeavourOS = "ΎΝλ" # "Ύη╗"
Fedora = "ΎΝΛ"
FreeBSD = "ΎΝΝ"
Garuda = "ΎΖ╝"
Gentoo = "ΎΝΞ"
HardenedBSD = "ΎοΩ"
Illumos = "ΏθΡο"
Linux = "ΎΖ╝"
Macos = "ΎΝΓ"
Manjaro = "ΎΝΤ"
Mariner = "ΎΖ╝"
MidnightBSD = "ΏθΝα"
Mint = "ΎΝΟ"
NetBSD = "ΎΖ╝"
NixOS = "ΎΝΥ"
OpenBSD = "ΎΝρ" # "ΎΖ╝"
OpenCloudOS = "έαΒΎ╕Π"
openEuler = "ΎΖ╝"
openSUSE = "ΎΝΦ"
OracleLinux = "έΛΓέΛΔ"
Pop = "ΎΝς" # "ΎΖ╝"
Raspbian = "ΎΝΧ"
Redhat = "ΎΝΨ"
RedHatEnterprise = "ΎΝΨ"
Redox = "Ώθπς"
Solus = "ΎΝφ" # "ΎΖ╝ "
SUSE = "ΎΝΦ"
Ubuntu = "ΎΝδ"
Unknown = "ΎΕΙ"
Windows = "ΌεΠ"

[username]
format = '[ΌΓ▒ ](fg:green bold)[$user]($style)[ ]()'
style_user = 'fg:green bold'
style_root = 'fg:red bold'
show_always = false
disabled = false

[hostname]
format = '[$ssh_symbol ](fg:green bold)[$hostname](fg:green bold)[ ]()'
ssh_only = true
ssh_symbol = 'ΌΞχ' # 'ΎΖ╜έΘΤ' # 'Ύμ╖ ' # 'ΎυΒέΘΤ'
#trim_at = '.companyname.com'
disabled = false

[sudo]
format = '[](fg:red bold)[as $symbol]($style)'
style = 'fg:red bold'
symbol = 'ΎΦΕ  έζψ ' # 'ΎΦΛ έζψ '
disabled = false

[directory]
format = '[](fg:white bold)[$read_only]($read_only_style)[$repo_root]($repo_root_style)[$path]($style)'
style = 'fg:cyan bold'
home_symbol = 'ΎΑΧ  ~ '
read_only = 'Ύι╜ ' # 'Ύμφ ' # 'Ύμχ ''
read_only_style = 'fg:cyan'
truncation_length = 3
truncation_symbol = 'ΎΥΥ  '
truncate_to_repo = true
repo_root_format = '[≤░Λλ ](fg:cyan bold)[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[ ]()'
repo_root_style	= 'fg:cyan bold'
disabled = false

[git_branch]
format = '[έζψ $symbol $branch(:$remote_branch)]($style)[ ]()'
style = 'fg:#E04D27'
symbol = 'Όεξ' # 'Ύηκ'
#ignore_branches = ['master', 'main']

[git_commit]
format = '[\($hash$tag\)]($style)[ ]()'
style = 'fg:#E04D27'
commit_hash_length = 8
tag_symbol = 'ΎΡΤ ' # 'ΎΑτ ''
disabled = false

[git_metrics]
format = '[\[+$added/]($added_style)[-$deleted\]]($deleted_style)[ ]()'
added_style = 'fg:#E04D27'
deleted_style = 'fg:#E04D27'
disabled = false

[git_status]
# place symbols before '$count'
format = '([$all_status$ahead_behind]($style))'
style = 'fg:#E04D27'
conflicted = '[ΎΣψ${count} ](fg:red)'
ahead = '[έΘκ${count} ](fg:yellow)'
behind = '[έΘμ${count} ](fg:yellow)'
diverged = '[έΘΧ${ahead_count}έΘκ${behind_count}έΘμ ](fg:yellow)' # έΘΧ έΗΧ έΘ│ ≤░╣╣ ≤░╣║ ≤░πΙ 
up_to_date = '[έεΥ ](fg:green)'
untracked = '[ΎΒ░ ${count} ](fg:red)' # 'ΎΒ░ ' # '? '
stashed = '[Ύδλ${count} ](fg:#A52A2A)' # 'ΏθΥο '# 'Όηδ ' # 'ΎΤΘ ' # 'ΌεΡ ' # 'ΌυΚ ' 
modified = '[≤░╖Κ${count} ](fg:#C8AC00)' # 'ΏθΥζ' # '! ' # ΌηΠ # ΎΓφ # ΎΔΡ
staged = '[ΎΔΣ${count} ](fg:green)' # '+ '
renamed = '[ΎηΔ${count} ](fg:yellow)' # 'ΎΩΙ ' # 'Ύτο' # ά┤Γ # Ύζν # ΎηΔ # ΎΔΝ # Ύ││
deleted = '[ΎψΛ${count} ](fg:orange)' # 'ΏθΩΣ ' '- '
disabled = false

[jobs]
format = '[| ](fg:blue bold)[$number $symbol]($style)'
style = 'fg:red'
symbol = 'ΎΑΥ '# 'Ύξφ' # 'ΎςΓ' # '≤░εΟ' # 'Όχλ' # 'έεο'
symbol_threshold = 1
number_threshold = 4
disabled = false

[memory_usage]
format = '[ ΌΓ▒ ](fg:purple bold)[$symbol ${ram} ${swap}]($style)'
style = 'fg:purple'
symbol = 'Ύυβ Ύξμ' # 'Ύυβ Ύπξ' # 'Ύυβ / ≤░╛╡' # '≤░Ξδ ≤░╛╡' # 'Ύυβ ≤░╛┤' # 'Ύυβ ≤░╛╢' # 'Ύυβ ≤░╛╖' 'Ύυβ ≤░μΓ'
threshold = 75
disabled = false

[cmd_duration]
format = '[ΌβΒ $duration ]($style)'
style = 'fg:yellow'
min_time = 500
disabled = false

[fill]
style = 'fg:#505050'
symbol = 'έΦΑ'

[status]
format = '[$symbol$status $hex_status ΎΨδ $signal_number-$signal_name ]($style)'
style = 'fg:red'
symbol = 'έεα '
disabled = false

[localip]
format = '[$localipv4 ](fg:green bold)'
ssh_only = true
disabled = false

[python]
format = " via [${symbol}${pyenv_prefix}${version} (${virtualenv})]($style) "
pyenv_version_name = false
pyenv_prefix = "pyenv "
style = "yellow"
symbol = "Όε╝ "

[rust]
format = "via [${symbol}#{version_format}${version}]($style)"
version_format = "ver "
style = "#B7410E"
symbol = "Όηρ "
